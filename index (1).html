<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>寻找你的雨林守护神</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;500;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0a0d12; --card:#141923; --green:#2D6A4F; --green2:#3a8a65;
    --gold:#B8860B; --gold2:#D4A843; --cream:#E8DCC8; --cream2:#c8baa8; --muted:#7a7060;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--bg);color:var(--cream);font-family:'Noto Serif SC',serif;min-height:100vh;overflow-x:hidden}
  ::-webkit-scrollbar{width:4px} ::-webkit-scrollbar-track{background:var(--bg)} ::-webkit-scrollbar-thumb{background:var(--gold);border-radius:2px}

  .fireflies{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;overflow:hidden}
  .firefly{position:absolute;width:3px;height:3px;border-radius:50%;background:var(--gold2);box-shadow:0 0 6px 2px rgba(212,168,67,0.4)}
  @keyframes ff1{0%,100%{transform:translate(0,0) scale(1);opacity:0}20%{opacity:0.8}50%{transform:translate(30px,-60px) scale(1.2);opacity:0.4}80%{opacity:0.6}}
  @keyframes ff2{0%,100%{transform:translate(0,0);opacity:0}30%{opacity:0.6}60%{transform:translate(-40px,-80px);opacity:0.3}}
  @keyframes ff3{0%,100%{transform:translate(0,0) scale(0.8);opacity:0}40%{opacity:0.9;transform:translate(20px,-40px) scale(1.3)}70%{opacity:0.2}}

  .page{animation:pageIn 0.7s ease forwards}
  @keyframes pageIn{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}

  /* LANDING */
  .landing{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:2rem;position:relative;z-index:1;text-align:center}
  .l-sym{font-size:1.8rem;color:var(--gold2);letter-spacing:0.3em;margin-bottom:2rem;opacity:0;animation:pageIn 1s ease 0.3s forwards}
  .l-title{font-size:clamp(1.9rem,5.5vw,3.2rem);font-weight:300;color:var(--cream);letter-spacing:0.15em;line-height:1.3;opacity:0;animation:pageIn 1s ease 0.6s forwards;margin-bottom:1.4rem}
  .l-div{display:flex;align-items:center;gap:1rem;width:min(360px,80vw);opacity:0;animation:pageIn 1s ease 0.85s forwards;margin-bottom:1.4rem}
  .l-div::before,.l-div::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent)}
  .l-sub{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:clamp(0.92rem,2.4vw,1.1rem);color:var(--cream2);line-height:2;max-width:400px;opacity:0;animation:pageIn 1s ease 1.05s forwards;margin-bottom:2.8rem}
  .btn-enter{background:var(--green);color:var(--cream);border:1px solid rgba(184,134,11,0.3);padding:0.95rem 2.8rem;border-radius:100px;font-family:'Noto Serif SC',serif;font-size:1rem;letter-spacing:0.15em;cursor:pointer;transition:all 0.35s;opacity:0;animation:pageIn 1s ease 1.3s forwards}
  .btn-enter:hover{border-color:var(--gold2);box-shadow:0 0 24px rgba(184,134,11,0.35),0 0 48px rgba(184,134,11,0.12);transform:scale(1.04)}
  .corner{position:fixed;font-size:1.3rem;color:var(--muted);opacity:0.35;z-index:0}
  .corner.tl{top:1.4rem;left:1.4rem}.corner.tr{top:1.4rem;right:1.4rem}.corner.bl{bottom:1.4rem;left:1.4rem}.corner.br{bottom:1.4rem;right:1.4rem}

  /* QUIZ */
  .quiz-wrap{min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:2rem 1rem;position:relative;z-index:1}
  .prog-wrap{width:min(640px,100%);margin-bottom:2.2rem}
  .prog-label{display:flex;justify-content:space-between;font-size:0.76rem;color:var(--muted);letter-spacing:0.1em;margin-bottom:0.45rem}
  .prog-track{height:2px;background:rgba(255,255,255,0.07);border-radius:1px;overflow:hidden}
  .prog-fill{height:100%;background:linear-gradient(90deg,var(--green),var(--gold2));transition:width 0.5s ease;border-radius:1px}
  .q-card{background:var(--card);border:1px solid rgba(184,134,11,0.14);border-radius:1.4rem;padding:2.2rem;width:min(640px,100%);box-shadow:0 8px 48px rgba(0,0,0,0.5),inset 0 1px 0 rgba(255,255,255,0.03);position:relative;overflow:hidden}
  .q-card::before{content:'✦';position:absolute;top:1.1rem;right:1.3rem;color:var(--gold);opacity:0.2;font-size:0.95rem}
  .q-num{font-size:0.7rem;color:var(--gold2);letter-spacing:0.2em;text-transform:uppercase;margin-bottom:0.9rem}
  .q-text{font-size:clamp(0.97rem,2.3vw,1.1rem);font-weight:300;color:var(--cream);line-height:1.95;margin-bottom:1.8rem}
  .opt-btn{display:flex;align-items:flex-start;gap:0.9rem;width:100%;text-align:left;background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.07);border-left:3px solid var(--green);border-radius:0.7rem;padding:0.85rem 1rem;margin-bottom:0.6rem;cursor:pointer;transition:all 0.22s;color:var(--cream2);font-family:'Noto Serif SC',serif;font-size:0.93rem;line-height:1.7}
  .opt-btn:last-child{margin-bottom:0}
  .opt-btn:hover,.opt-btn.sel{border-color:var(--gold2);border-left-color:var(--gold2);background:rgba(184,134,11,0.08);color:var(--cream);transform:translateX(3px)}
  .opt-lbl{font-size:0.72rem;font-weight:500;color:var(--gold2);letter-spacing:0.1em;margin-top:0.1rem;flex-shrink:0}

  /* TRANSITION */
  .t-page{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1.4rem;z-index:1;position:relative}
  .t-sym{font-size:2.8rem;color:var(--gold2);animation:rot 3s linear infinite}
  @keyframes rot{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
  .t-txt{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:1.25rem;color:var(--cream2);letter-spacing:0.1em;animation:pulse 2s ease infinite}
  @keyframes pulse{0%,100%{opacity:0.5}50%{opacity:1}}
  .t-row{display:flex;gap:1.5rem;color:var(--muted);font-size:1.2rem}
  .t-row span{animation:fiu 0.5s ease forwards;opacity:0}
  .t-row span:nth-child(1){animation-delay:0.3s}.t-row span:nth-child(2){animation-delay:0.7s}.t-row span:nth-child(3){animation-delay:1.1s}
  @keyframes fiu{from{opacity:0;transform:translateY(8px)}to{opacity:0.55;transform:translateY(0)}}
  @keyframes burstFade{from{opacity:1}to{opacity:0}}


  /* RESULT */
  .res-wrap{min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:3rem 1rem 4rem;position:relative;z-index:1;width:min(660px,100%);margin:0 auto}
  .res-crown{font-size:2.8rem;margin-bottom:0.4rem}
  .res-name{font-size:clamp(1.9rem,5.5vw,2.8rem);font-weight:300;letter-spacing:0.2em;color:var(--cream);text-align:center;margin-bottom:0.35rem}
  .res-title{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:1.05rem;color:var(--gold2);letter-spacing:0.1em;text-align:center;margin-bottom:0.9rem}
  .res-div{display:flex;align-items:center;gap:1rem;width:min(300px,75vw);margin-bottom:1.1rem}
  .res-div::before,.res-div::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent)}
  .whisper{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:1.02rem;color:var(--cream2);text-align:center;padding:0.75rem 1.4rem;border-left:2px solid var(--gold);border-right:2px solid var(--gold);background:rgba(184,134,11,0.05);border-radius:0.45rem;margin-bottom:2.2rem;max-width:380px;line-height:1.9}
  .wh-lbl{font-size:0.68rem;letter-spacing:0.15em;color:var(--gold);display:block;margin-bottom:0.3rem;font-style:normal;font-family:'Noto Serif SC',serif}

  /* TAROT CARD */
  .tarot-outer{margin-bottom:2.5rem;position:relative;display:flex;justify-content:center}
  .tarot-card{
    width:min(240px,70vw);
    aspect-ratio:2/3.2;
    border-radius:12px 12px 12px 12px;
    position:relative;
    overflow:hidden;
    box-shadow:
      0 0 0 2px #B8860B,
      0 0 0 5px #0a0d12,
      0 0 0 7px #B8860B55,
      0 8px 40px rgba(0,0,0,0.8),
      0 0 60px rgba(184,134,11,0.2);
    background:#0a0d12;
    animation:tarotReveal 0.8s cubic-bezier(0.16,1,0.3,1) forwards;
    transform-origin:center bottom;
  }
  @keyframes tarotReveal{
    from{opacity:0;transform:scale(0.85) translateY(20px) rotateX(8deg)}
    to{opacity:1;transform:scale(1) translateY(0) rotateX(0deg)}
  }
  .tarot-img{
    width:100%;height:100%;
    object-fit:cover;
    object-position:center top;
    display:block;
    image-rendering:-webkit-optimize-contrast;
    image-rendering:crisp-edges;
  }
  /* ornate border overlay SVG */
  .tarot-border{
    position:absolute;inset:0;pointer-events:none;z-index:2;
  }
  .tarot-glow{
    position:absolute;inset:0;
    background:radial-gradient(ellipse at 50% 0%, rgba(212,168,67,0.12) 0%, transparent 60%);
    z-index:1;pointer-events:none;
  }
  /* floating deco symbols */
  .tarot-deco{position:absolute;color:var(--gold2);font-size:0.9rem;z-index:3;opacity:0.7;pointer-events:none}
  @keyframes tdfl{0%,100%{transform:translateY(0) rotate(0deg);opacity:0.5}50%{transform:translateY(-5px) rotate(6deg);opacity:0.9}}

  .sec{width:100%;margin-bottom:2.2rem;background:var(--card);border:1px solid rgba(184,134,11,0.09);border-radius:1.1rem;padding:1.6rem}
  .sec-h{font-family:'Cormorant Garamond',serif;font-size:0.76rem;letter-spacing:0.25em;color:var(--gold2);text-transform:uppercase;margin-bottom:1.1rem;display:flex;align-items:center;gap:0.6rem}
  .sec-h::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,rgba(184,134,11,0.35),transparent)}

  .badge{display:inline-block;background:rgba(45,106,79,0.28);border:1px solid var(--green2);color:var(--cream);padding:0.28rem 0.9rem;border-radius:100px;font-size:0.8rem;letter-spacing:0.07em;margin-bottom:0.9rem}
  .scene{font-size:0.94rem;line-height:2.05;color:var(--cream2);font-weight:300;margin-bottom:1.1rem}
  .skill-box{background:rgba(184,134,11,0.06);border-left:3px solid var(--gold);border-radius:0 0.45rem 0.45rem 0;padding:0.75rem 1rem}
  .skill-label{font-size:0.68rem;letter-spacing:0.18em;color:var(--gold);text-transform:uppercase;margin-bottom:0.3rem;font-family:'Cormorant Garamond',serif}
  .skill-nm{font-size:0.95rem;font-weight:500;color:var(--gold2);letter-spacing:0.1em;margin-bottom:0.25rem}
  .skill-ds{font-size:0.85rem;color:var(--cream2)}

  .btn-row{display:flex;gap:0.9rem;flex-wrap:wrap;justify-content:center;margin-top:0.4rem}
  .btn-ghost{background:transparent;border:1px solid rgba(232,220,200,0.22);color:var(--cream2);padding:0.75rem 1.8rem;border-radius:100px;cursor:pointer;font-family:'Noto Serif SC',serif;font-size:0.88rem;letter-spacing:0.07em;transition:all 0.28s}
  .btn-ghost:hover{border-color:var(--cream2);color:var(--cream);background:rgba(255,255,255,0.03)}
  .btn-gold{background:var(--gold);border:1px solid var(--gold2);color:#0a0d12;padding:0.75rem 1.8rem;border-radius:100px;cursor:pointer;font-family:'Noto Serif SC',serif;font-size:0.88rem;letter-spacing:0.07em;transition:all 0.28s;font-weight:500}
  .btn-gold:hover{background:var(--gold2);box-shadow:0 0 20px rgba(184,134,11,0.4);transform:scale(1.03)}

  /* Share sheet */
  .share-sheet{position:fixed;inset:0;background:rgba(0,0,0,0.7);display:flex;align-items:flex-end;justify-content:center;z-index:200;backdrop-filter:blur(4px)}
  .share-panel{background:#1a2030;border:1px solid rgba(184,134,11,0.3);border-radius:1.5rem 1.5rem 0 0;padding:2rem 1.5rem 2.5rem;width:min(480px,100%);animation:slideUp 0.35s ease}
  @keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
  .share-title{font-size:0.75rem;letter-spacing:0.2em;color:var(--gold2);text-align:center;margin-bottom:1.5rem;text-transform:uppercase}
  .share-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:0.8rem;margin-bottom:1.5rem}
  .share-btn{display:flex;flex-direction:column;align-items:center;gap:0.4rem;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:0.8rem;padding:0.8rem 0.4rem;cursor:pointer;transition:all 0.22s;color:var(--cream2);font-size:0.72rem;letter-spacing:0.04em}
  .share-btn:hover{border-color:var(--gold2);background:rgba(184,134,11,0.08);color:var(--cream)}
  .share-icon{font-size:1.5rem;margin-bottom:0.1rem}
  .share-cancel{width:100%;background:transparent;border:1px solid rgba(255,255,255,0.12);color:var(--muted);padding:0.7rem;border-radius:0.7rem;cursor:pointer;font-family:'Noto Serif SC',serif;font-size:0.85rem;transition:all 0.22s}
  .share-cancel:hover{border-color:var(--cream2);color:var(--cream)}

  .res-footer{margin-top:1.8rem;font-size:0.75rem;color:var(--muted);text-align:center;letter-spacing:0.08em;font-style:italic}

  .rad-legend{display:flex;gap:1.4rem;margin-top:0.7rem;font-size:0.76rem;color:var(--muted)}
  .ldot{width:7px;height:7px;border-radius:50%;display:inline-block;margin-right:0.35rem;vertical-align:middle}
  .rad-cap{font-size:0.73rem;color:var(--muted);text-align:center;margin-top:0.5rem;font-style:italic}

  @media(max-width:480px){
    .q-card{padding:1.4rem}.sec{padding:1.1rem}.opt-btn{font-size:0.88rem;padding:0.75rem 0.9rem}
    .tarot-card{width:min(200px,65vw)}
  }
</style>
<script src="imgs.js"></script>
</head>
<body>
<div id="root"></div>
<div id="err" style="display:none;color:red;padding:2rem;font-family:monospace;position:fixed;top:0;left:0;z-index:9999;background:#fff;max-width:100vw;word-break:break-all"></div>
<script>window.onerror=function(m,s,l,c,e){var d=document.getElementById("err");if(d){d.style.display="block";d.textContent=m+" (line "+l+")";}}</script>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

// ── GUARDIAN IMAGES (base64) ──────────────────────────────────
// IMGS loaded from imgs.js


// ── QUESTIONS ─────────────────────────────────────────────────
// 20 questions, 5 chapters of narrative progression
// 8 questions contain language-based options (Q2,Q4,Q6,Q8,Q10,Q15,Q18,Q19)
// Dimension order shuffled per question, no column maps to same result
const QUESTIONS = [
  // ── CHAPTER 1: 入林 Q1-Q4 ──
  { q: "Q1. 暮色里，一只玻璃蛙坐在你靴子尖上，嘴里含着一粒还没唱出来的音符。它抬头看你，那粒音符在它喉咙里微微发光。", chapter:1,
    opts:[
      {l:"A",t:"俯身把耳朵贴近它的喉咙，什么都没说，只是听。",d:"depth"},
      {l:"B",t:"用手指轻弹靴子尖，给它一个「我在」的信号。",d:"harmony"},
      {l:"C",t:"你轻声哼出一个音，试探它会不会接着唱下去。",d:"intuition"},
      {l:"D",t:"站着不动，把全身重量稳稳交给脚下的泥土，等它先开口。",d:"rhythm"},
      {l:"E",t:"迈开脚，把它带进更深处，看那粒音符在黑暗里会不会变色。",d:"flow"}
    ]},
  { q: "Q2. 走了半小时，巨树根系里飘出一股气味——烤熟的香蕉叶裹着某种你从未吃过的果子。一只树懒从洞里探出头，手里捏着那个果子，等着你。", chapter:1,
    opts:[
      {l:"A",t:"接过来先闻，什么都没咬，让气味先在你体内走一圈。",d:"intuition"},
      {l:"B",t:"你对它说：「一人一半。」然后把果子分开。",d:"harmony"},
      {l:"C",t:"咬一口，仔细在嘴里辨认——甜的哪里来，苦的哪里去。",d:"depth"},
      {l:"D",t:"把果子放进包里，告诉自己等真正饿了再打开。",d:"rhythm"},
      {l:"E",t:"把果子扔进空气，跟着它的落点往前走。",d:"flow"}
    ]},
  { q: "Q3. 天色更暗，你听见前方有鼓声——一群红色金刚蚁在用腹部敲击树根，节奏稳得像一首古老的舞曲。它们在邀请你入场。", chapter:1,
    opts:[
      {l:"A",t:"踩进去，让脚跟着鼓点，不管对不对拍。",d:"intuition"},
      {l:"B",t:"站在圆圈外，先数三个完整节拍，找到规律再入场。",d:"depth"},
      {l:"C",t:"从圆圈对面穿过去，看打破完整性之后会发生什么。",d:"flow"},
      {l:"D",t:"退到树后，用手指在树皮上悄悄跟着敲，不打扰它们。",d:"rhythm"},
      {l:"E",t:"蹲到蚁群旁边，把手贴地感受震动，让身体先于语言理解它。",d:"harmony"}
    ]},
  { q: "Q4. 你坐下来休息。一群萤火虫聚成一团，把一枚发光的种子托到你掌心，然后散开。种子在你手里微微颤动，像是活的。", chapter:1,
    opts:[
      {l:"A",t:"握紧它，让它的热度把手掌焐暖，闭眼感受它的节奏。",d:"rhythm"},
      {l:"B",t:"把种子放在舌尖，尝一下，哪怕只是一秒。",d:"intuition"},
      {l:"C",t:"把种子举到眼前，数它的光纹有几道。",d:"depth"},
      {l:"D",t:"你轻声问：「你要去哪里？」然后等待某种回应。",d:"harmony"},
      {l:"E",t:"把种子埋进脚边的泥里，然后继续走。",d:"flow"}
    ]},
  // ── CHAPTER 2: 深入 Q5-Q8 ──
  { q: "Q5. 夜里，萤火虫在你四周拼出一个巨大的符文。一只叶尾壁虎趴在你手背，用尾巴尖在你皮肤上照着那个字慢慢描摹。它在教你认字。", chapter:2,
    opts:[
      {l:"A",t:"睁大眼，把壁虎描的每一笔死死记住。",d:"depth"},
      {l:"B",t:"闭眼，只用皮肤感受尾巴尖的走向，不看。",d:"intuition"},
      {l:"C",t:"让壁虎描完，再用手指在空气里把整个字默默画一遍。",d:"rhythm"},
      {l:"D",t:"你轻声把你猜的那个字念出来，看壁虎有没有停顿。",d:"harmony"},
      {l:"E",t:"在壁虎描完之前，用另一只手在地上写出你猜的字。",d:"flow"}
    ]},
  { q: "Q6. 你发现一棵树上挂着几十个蜂巢，形状各异——有的像弯月，有的像拳头，有的像睡着的脸。一只变色龙停在你肩上，眼睛指向其中一个，然后从绿色变成了金色，在让你猜里面装着什么。", chapter:2,
    opts:[
      {l:"A",t:"选那个像睡着的脸——它看起来藏得最深。",d:"depth"},
      {l:"B",t:"拿石头轻敲每个蜂巢，用声音判断里面空还是满。",d:"intuition"},
      {l:"C",t:"选最小的那个，先不急，等变色龙自己给出答案。",d:"rhythm"},
      {l:"D",t:"站在变色龙旁边，把手慢慢靠近每个蜂巢，感受气流的温度。",d:"harmony"},
      {l:"E",t:"选那个像拳头的——它的形状本身就已经是答案了。",d:"flow"}
    ]},

// ── AMBIENT CANVAS ─────────────────────────────────────────────
function AmbientCanvas({ chapter }) {
  const canvasRef = useRef(null);
  const animRef = useRef(null);
  const particlesRef = useRef([]);
  const chapterRef = useRef(chapter);

  useEffect(() => { chapterRef.current = chapter; }, [chapter]);

  useEffect(() => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const ctx = canvas.getContext('2d');

    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    // Init particles
    function initParticles(cfg) {
      particlesRef.current = Array.from({ length: cfg.count }, () => ({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        r: 1 + Math.random() * 2.5,
        vx: (Math.random() - 0.5) * cfg.speed,
        vy: (Math.random() - 0.5) * cfg.speed - 0.1,
        life: Math.random(),
        maxLife: 0.6 + Math.random() * 0.4,
        color: cfg.particleColor,
      }));
    }

    const cfg = CHAPTER_CONFIG[chapterRef.current] || CHAPTER_CONFIG[1];
    initParticles(cfg);

    function draw() {
      const c = CHAPTER_CONFIG[chapterRef.current] || CHAPTER_CONFIG[1];
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // Vignette
      const vg = ctx.createRadialGradient(canvas.width/2, canvas.height/2, canvas.height*0.2, canvas.width/2, canvas.height/2, canvas.height*0.8);
      vg.addColorStop(0, 'transparent');
      vg.addColorStop(1, 'rgba(10,13,18,0.6)');
      ctx.fillStyle = vg;
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Particles
      const ps = particlesRef.current;
      // Adjust count dynamically
      while (ps.length < c.count) {
        ps.push({ x: Math.random()*canvas.width, y: canvas.height + 10,
          r: 1+Math.random()*2.5, vx:(Math.random()-0.5)*c.speed,
          vy:(Math.random()-0.5)*c.speed-0.1, life:0, maxLife:0.6+Math.random()*0.4, color:c.particleColor });
      }
      while (ps.length > c.count + 5) ps.pop();

      ps.forEach(p => {
        p.life += 0.004 + Math.random()*0.002;
        p.x += p.vx; p.y += p.vy;
        if (p.life > p.maxLife || p.x < -10 || p.x > canvas.width+10 || p.y < -10) {
          p.x = Math.random()*canvas.width;
          p.y = canvas.height + 10;
          p.life = 0; p.color = c.particleColor;
          p.vx = (Math.random()-0.5)*c.speed;
          p.vy = (Math.random()-0.5)*c.speed - 0.2;
        }
        const t = p.life / p.maxLife;
        const alpha = t < 0.3 ? t/0.3 : t > 0.7 ? (1-t)/0.3 : 1;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
        ctx.fillStyle = `rgba(${p.color},${alpha * 0.75})`;
        ctx.fill();
        // Glow
        const grd = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.r*4);
        grd.addColorStop(0, `rgba(${p.color},${alpha*0.3})`);
        grd.addColorStop(1, 'transparent');
        ctx.fillStyle = grd;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r*4, 0, Math.PI*2);
        ctx.fill();
      });

      animRef.current = requestAnimationFrame(draw);
    }
    draw();
    return () => { cancelAnimationFrame(animRef.current); window.removeEventListener('resize', resize); };
  }, []);

  return <canvas ref={canvasRef} style={{position:'fixed',top:0,left:0,width:'100%',height:'100%',pointerEvents:'none',zIndex:0}}/>;
}

// Chapter transition burst effect
function useBurst(chapter) {
  const [burst, setBurst] = useState(false);
  const prev = useRef(chapter);
  useEffect(() => {
    if (prev.current !== chapter) {
      setBurst(true);
      setTimeout(() => setBurst(false), 800);
      prev.current = chapter;
    }
  }, [chapter]);
  return burst;

// ── QUIZ ──────────────────────────────────────────────────────
function Quiz({ onFinish }) {
  const [cur, setCur] = useState(0);
  const [sc, setSc] = useState({depth:0,harmony:0,intuition:0,rhythm:0,flow:0});
  const [sel, setSel] = useState(null);
  const [key, setKey] = useState(0);

  const q = QUESTIONS[cur];
  const chapter = q.chapter;
  const cfg = CHAPTER_CONFIG[chapter];
  const burst = useBurst(chapter);

  function pick(dim, lbl) {
    if (sel) return;
    setSel(lbl);
    const ns = {...sc, [dim]: sc[dim]+1};
    setTimeout(() => {
      if (cur < QUESTIONS.length-1) {
        setCur(c => c+1); setSel(null); setKey(k => k+1); setSc(ns);
      } else onFinish(ns);
    }, 350);
  }

  // Chapter label colors
  const chapterColors = {1:'#2D6A4F',2:'#0D4A6E',3:'#4A2D8A',4:'#B8860B',5:'#7a9a7a'};
  const chColor = chapterColors[chapter] || '#2D6A4F';

  return (
    <div className="quiz-wrap" style={{transition:'background 1.2s ease'}}>
      <AmbientCanvas chapter={chapter}/>
      {burst && <div style={{position:'fixed',inset:0,background:`radial-gradient(circle at center, rgba(${cfg.particleColor},0.12), transparent 70%)`,animation:'burstFade 0.8s ease forwards',pointerEvents:'none',zIndex:1}}/>}
      <div className="prog-wrap">
        <div className="prog-label">
          <span style={{color:chColor,transition:'color 0.8s'}}>🜂 {cfg.label}</span>
          <span style={{color:'var(--gold2)'}}>✦ {cur+1} / {QUESTIONS.length}</span>
        </div>
        <div className="prog-track">
          <div className="prog-fill" style={{width:`${(cur+1)/QUESTIONS.length*100}%`, background:`linear-gradient(90deg,${chColor},var(--gold2))`}}/>
        </div>
      </div>
      <div key={key} className="q-card page">
        <div className="q-num" style={{color:chColor}}>第{chapter}章 · 问题 {cur+1}</div>
        <div className="q-text">{q.q}</div>

// ── SVG RADAR ─────────────────────────────────────────────────
function SVGRadar({ userRaw, baseline }) {
  const size=260, cx=130, cy=130, maxR=95;
  const keys=DIM_ORDER, n=keys.length;
  const displayUser = keys.map(k => {
    const raw=userRaw[k]||0, base=baseline[k];
    const diff=Math.max(-18,Math.min(18,raw-base));
    return Math.max(10,Math.min(98,base+diff));
  });
  function pt(val,i){ const a=(Math.PI*2*i)/n-Math.PI/2,r=(val/100)*maxR; return {x:cx+r*Math.cos(a),y:cy+r*Math.sin(a)}; }
  function path(pts){ return pts.map((p,i)=>`${i===0?'M':'L'}${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(' ')+'Z'; }
  const rings=[20,40,60,80,100];
  const basePts=keys.map((k,i)=>pt(baseline[k],i));
  const userPts=displayUser.map((v,i)=>pt(v,i));
  const axes=keys.map((k,i)=>{ const a=(Math.PI*2*i)/n-Math.PI/2,lr=maxR+20; return {x2:cx+maxR*Math.cos(a),y2:cy+maxR*Math.sin(a),lx:cx+lr*Math.cos(a),ly:cy+lr*Math.sin(a),label:DIM_LABELS[k]}; });
  return (
    <svg width="100%" viewBox={`0 0 ${size} ${size}`} style={{display:'block',maxWidth:290,margin:'0 auto'}}>
      {rings.map(r=>{const pts=keys.map((_,i)=>pt(r,i));return <polygon key={r} points={pts.map(p=>`${p.x},${p.y}`).join(' ')} fill="none" stroke="rgba(255,255,255,0.07)" strokeWidth="1"/>;})}
      {axes.map((a,i)=><line key={i} x1={cx} y1={cy} x2={a.x2} y2={a.y2} stroke="rgba(255,255,255,0.07)" strokeWidth="1"/>)}
      <path d={path(basePts)} fill="none" stroke="#2D6A4F" strokeWidth="1.5" strokeDasharray="5 3" opacity="0.9"/>
      <path d={path(userPts)} fill="rgba(212,168,67,0.2)" stroke="#D4A843" strokeWidth="2"/>
      {userPts.map((p,i)=><circle key={i} cx={p.x} cy={p.y} r="3.5" fill="#D4A843"/>)}
      {axes.map((a,i)=><text key={i} x={a.lx} y={a.ly} textAnchor="middle" dominantBaseline="middle" fontSize="9.5" fill="#9A8F7E" fontFamily="Noto Serif SC, serif" style={{userSelect:'none'}}>{a.label}</text>)}
    </svg>
  );
}

// ── SHARE IMAGE (Canvas) ───────────────────────────────────────
function roundRect(ctx,x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.arcTo(x+w,y,x+w,y+r,r);ctx.lineTo(x+w,y+h-r);ctx.arcTo(x+w,y+h,x+w-r,y+h,r);ctx.lineTo(x+r,y+h);ctx.arcTo(x,y+h,x,y+h-r,r);ctx.lineTo(x,y+r);ctx.arcTo(x,y,x+r,y,r);ctx.closePath();}

function generateShareImage(guardian, norm) {
  return new Promise(resolve => {
    const W=750, H=1334;
    const canvas = document.createElement('canvas');
    canvas.width=W; canvas.height=H;
    const ctx=canvas.getContext('2d');

    // BG
    const bg=ctx.createLinearGradient(0,0,0,H);
    bg.addColorStop(0,'#0a0d12'); bg.addColorStop(0.5,'#111620'); bg.addColorStop(1,'#0a0d12');
    ctx.fillStyle=bg; ctx.fillRect(0,0,W,H);

    // Outer border
    ctx.strokeStyle='#B8860B'; ctx.lineWidth=3;
    ctx.beginPath(); roundRect(ctx,14,14,W-28,H-28,8); ctx.stroke();
    ctx.strokeStyle='rgba(184,134,11,0.3)'; ctx.lineWidth=1;
    ctx.beginPath(); roundRect(ctx,22,22,W-44,H-44,6); ctx.stroke();

    // Corner ornaments
    ctx.fillStyle='#D4A843'; ctx.font='20px serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
    [['✦',38,38],['✦',W-38,38],['◈',38,H-38],['◈',W-38,H-38]].forEach(([s,x,y])=>ctx.fillText(s,x,y));

    // Top label
    ctx.fillStyle='rgba(212,168,67,0.65)'; ctx.font='16px serif'; ctx.textAlign='center';
    ctx.fillText('🜂  寻找你的雨林守护神  🜂', W/2, 62);
    const g1=ctx.createLinearGradient(100,0,W-100,0);
    g1.addColorStop(0,'transparent'); g1.addColorStop(0.5,'#B8860B'); g1.addColorStop(1,'transparent');
    ctx.strokeStyle=g1; ctx.lineWidth=1; ctx.beginPath(); ctx.moveTo(100,82); ctx.lineTo(W-100,82); ctx.stroke();

    // Tarot card image
    const img=new Image();
    img.onload=()=>{
      const cW=260, cH=416, cX=(W-cW)/2, cY=100;
      ctx.shadowColor=`${guardian.glow}88`; ctx.shadowBlur=32;
      ctx.fillStyle='#0a0d12'; ctx.beginPath(); roundRect(ctx,cX,cY,cW,cH,10); ctx.fill();
      ctx.shadowBlur=0;
      ctx.save(); ctx.beginPath(); roundRect(ctx,cX,cY,cW,cH,10); ctx.clip();
      ctx.drawImage(img,cX,cY,cW,cH); ctx.restore();
      ctx.strokeStyle='#B8860B'; ctx.lineWidth=2.5;
      ctx.beginPath(); roundRect(ctx,cX,cY,cW,cH,10); ctx.stroke();
      ctx.strokeStyle='rgba(184,134,11,0.4)'; ctx.lineWidth=1;
      ctx.beginPath(); roundRect(ctx,cX+5,cY+5,cW-10,cH-10,7); ctx.stroke();

      // Name & title
      ctx.fillStyle='#E8DCC8'; ctx.font='bold 52px "Noto Serif SC",serif'; ctx.textAlign='center';
      ctx.fillText(guardian.name, W/2, cY+cH+58);
      ctx.fillStyle='#D4A843'; ctx.font='italic 26px "Cormorant Garamond",serif';
      ctx.fillText(guardian.title, W/2, cY+cH+94);
      const g2=ctx.createLinearGradient(140,0,W-140,0);
      g2.addColorStop(0,'transparent'); g2.addColorStop(0.5,'#B8860B'); g2.addColorStop(1,'transparent');
      ctx.strokeStyle=g2; ctx.lineWidth=1; ctx.beginPath(); ctx.moveTo(140,cY+cH+116); ctx.lineTo(W-140,cY+cH+116); ctx.stroke();

      // Whisper
      ctx.fillStyle='rgba(200,186,168,0.9)'; ctx.font='italic 27px "Cormorant Garamond",serif';
      ctx.fillText('「'+guardian.whisper+'」', W/2, cY+cH+148);

      // Archetype badge
      const bW=190,bH=36,bX=W/2-bW/2,bY=cY+cH+170;
      ctx.fillStyle='rgba(45,106,79,0.4)'; ctx.strokeStyle='#3a8a65'; ctx.lineWidth=1;
      ctx.beginPath(); roundRect(ctx,bX,bY,bW,bH,18); ctx.fill();
      ctx.beginPath(); roundRect(ctx,bX,bY,bW,bH,18); ctx.stroke();
      ctx.fillStyle='#E8DCC8'; ctx.font='22px "Noto Serif SC",serif';
      ctx.fillText(guardian.arch, W/2, bY+bH/2+1);

      // Radar
      const rcx=W/2, rcy=cY+cH+360, maxR=105;
      const dims=DIM_ORDER, n=dims.length;
      [20,40,60,80,100].forEach(rv=>{
        const pts=dims.map((_,i)=>{const a=(Math.PI*2*i)/n-Math.PI/2,r=(rv/100)*maxR;return[rcx+r*Math.cos(a),rcy+r*Math.sin(a)];});
        ctx.beginPath(); ctx.moveTo(pts[0][0],pts[0][1]); pts.slice(1).forEach(p=>ctx.lineTo(p[0],p[1])); ctx.closePath();
        ctx.strokeStyle='rgba(255,255,255,0.08)'; ctx.lineWidth=1; ctx.stroke();
      });
      dims.forEach((_,i)=>{const a=(Math.PI*2*i)/n-Math.PI/2;ctx.beginPath();ctx.moveTo(rcx,rcy);ctx.lineTo(rcx+maxR*Math.cos(a),rcy+maxR*Math.sin(a));ctx.strokeStyle='rgba(255,255,255,0.08)';ctx.lineWidth=1;ctx.stroke();});
      const bPts=dims.map((k,i)=>{const a=(Math.PI*2*i)/n-Math.PI/2,r=(guardian.base[k]/100)*maxR;return[rcx+r*Math.cos(a),rcy+r*Math.sin(a)];});
      ctx.beginPath(); ctx.moveTo(bPts[0][0],bPts[0][1]); bPts.slice(1).forEach(p=>ctx.lineTo(p[0],p[1])); ctx.closePath();
      ctx.strokeStyle='#2D6A4F'; ctx.lineWidth=2; ctx.setLineDash([5,3]); ctx.stroke(); ctx.setLineDash([]);
      const uPts=dims.map((k,i)=>{const a=(Math.PI*2*i)/n-Math.PI/2,raw=norm[k]||0,base=guardian.base[k],diff=Math.max(-18,Math.min(18,raw-base)),val=Math.max(10,Math.min(98,base+diff)),r=(val/100)*maxR;return[rcx+r*Math.cos(a),rcy+r*Math.sin(a)];});
      ctx.beginPath(); ctx.moveTo(uPts[0][0],uPts[0][1]); uPts.slice(1).forEach(p=>ctx.lineTo(p[0],p[1])); ctx.closePath();
      ctx.fillStyle='rgba(212,168,67,0.2)'; ctx.fill(); ctx.strokeStyle='#D4A843'; ctx.lineWidth=2; ctx.stroke();
      uPts.forEach(p=>{ctx.beginPath();ctx.arc(p[0],p[1],4,0,Math.PI*2);ctx.fillStyle='#D4A843';ctx.fill();});
      dims.forEach((k,i)=>{const a=(Math.PI*2*i)/n-Math.PI/2,lr=maxR+28;ctx.fillStyle='#9A8F7E';ctx.font='19px "Noto Serif SC",serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(DIM_LABELS[k],rcx+lr*Math.cos(a),rcy+lr*Math.sin(a));});

      // Radar title
      ctx.fillStyle='rgba(212,168,67,0.6)'; ctx.font='16px serif'; ctx.textAlign='center';
      ctx.fillText('✦ 你的森林印记', W/2, cY+cH+232);

      // Legend
      ctx.textAlign='left';
      [[W/2-80,'#D4A843','你的印记'],[W/2+10,'#2D6A4F','守护神基准']].forEach(([x,c,lbl])=>{
        ctx.beginPath(); ctx.arc(x,rcy+maxR+32,5,0,Math.PI*2); ctx.fillStyle=c; ctx.fill();
        ctx.fillStyle='#7a7060'; ctx.font='17px serif'; ctx.fillText(lbl,x+12,rcy+maxR+37);
      });

      // Footer
      const g3=ctx.createLinearGradient(100,0,W-100,0);
      g3.addColorStop(0,'transparent'); g3.addColorStop(0.5,'#B8860B'); g3.addColorStop(1,'transparent');
      ctx.strokeStyle=g3; ctx.lineWidth=1; ctx.beginPath(); ctx.moveTo(100,H-68); ctx.lineTo(W-100,H-68); ctx.stroke();
      ctx.fillStyle='rgba(122,112,96,0.7)'; ctx.font='italic 19px "Cormorant Garamond",serif';
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText('🜄 愿你在每一片森林的呼吸里，找到你自己。', W/2, H-42);

      resolve(canvas.toDataURL('image/png'));
    };
    img.src = IMGS[guardian.id];
  });
}

  const [view, setView] = useState('landing');
  const [scores, setScores] = useState(null);
  function finish(s) { setScores(s); setView('transition'); }
  function restart() { setScores(null); setView('landing'); }
  if (view==='landing') return <Landing onStart={()=>setView('quiz')}/>;
  if (view==='quiz') return <Quiz onFinish={finish}/>;
  if (view==='transition') return <Transition onDone={()=>setView('result')}/>;
  return <Result scores={scores} onRestart={restart}/>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
